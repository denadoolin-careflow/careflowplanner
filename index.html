    <style>
      /* Prevent white/dark flash before React mounts.
         Paint the FULL gradient-dawn for the active theme preset + mode
         on <html> so the first frame matches what AppLayout will render,
         not just a solid color. Each rule mirrors the corresponding
         --gradient-dawn value in src/index.css. */
      html, body { min-height: 100%; }
      html { color-scheme: light; background: linear-gradient(160deg, hsl(36 55% 96%) 0%, hsl(258 50% 94%) 50%, hsl(350 55% 94%) 100%) no-repeat fixed; }
      html.dark { color-scheme: dark; background: linear-gradient(160deg, hsl(260 22% 10%) 0%, hsl(258 30% 18%) 50%, hsl(350 25% 18%) 100%) no-repeat fixed; }

      html[data-theme="sage"]      { background: linear-gradient(160deg, hsl(145 30% 96%) 0%, hsl(160 40% 92%) 50%, hsl(90 40% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="sage"] { background: linear-gradient(160deg, hsl(155 25% 12%) 0%, hsl(160 30% 18%) 50%, hsl(90 25% 16%) 100%) no-repeat fixed; }
      html[data-theme="dusk"]      { background: linear-gradient(160deg, hsl(240 30% 96%) 0%, hsl(270 45% 93%) 50%, hsl(310 50% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="dusk"] { background: linear-gradient(160deg, hsl(240 28% 11%) 0%, hsl(270 30% 18%) 50%, hsl(310 30% 18%) 100%) no-repeat fixed; }
      html[data-theme="mono"]      { background: linear-gradient(160deg, hsl(0 0% 98%) 0%, hsl(0 0% 95%) 100%) no-repeat fixed; }
      html.dark[data-theme="mono"] { background: linear-gradient(160deg, hsl(0 0% 8%) 0%, hsl(0 0% 14%) 100%) no-repeat fixed; }
      html[data-theme="rose"]      { background: linear-gradient(160deg, hsl(350 50% 97%) 0%, hsl(345 60% 93%) 50%, hsl(20 60% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="rose"] { background: linear-gradient(160deg, hsl(345 25% 12%) 0%, hsl(350 30% 18%) 50%, hsl(20 25% 16%) 100%) no-repeat fixed; }
      html[data-theme="ocean"]      { background: linear-gradient(160deg, hsl(200 40% 97%) 0%, hsl(205 60% 92%) 50%, hsl(175 50% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="ocean"] { background: linear-gradient(160deg, hsl(205 30% 10%) 0%, hsl(205 35% 16%) 50%, hsl(175 28% 14%) 100%) no-repeat fixed; }
      html[data-theme="sunset"]      { background: linear-gradient(160deg, hsl(40 60% 96%) 0%, hsl(20 70% 92%) 50%, hsl(350 65% 92%) 100%) no-repeat fixed; }
      html.dark[data-theme="sunset"] { background: linear-gradient(160deg, hsl(22 25% 11%) 0%, hsl(20 30% 18%) 50%, hsl(350 25% 17%) 100%) no-repeat fixed; }
      html[data-theme="forest"]      { background: linear-gradient(160deg, hsl(130 25% 96%) 0%, hsl(140 30% 90%) 50%, hsl(60 35% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="forest"] { background: linear-gradient(160deg, hsl(140 25% 9%) 0%, hsl(140 28% 15%) 50%, hsl(60 18% 14%) 100%) no-repeat fixed; }
      html[data-theme="lavender"]      { background: linear-gradient(160deg, hsl(255 50% 97%) 0%, hsl(255 60% 93%) 50%, hsl(290 55% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="lavender"] { background: linear-gradient(160deg, hsl(255 28% 12%) 0%, hsl(255 32% 18%) 50%, hsl(290 28% 18%) 100%) no-repeat fixed; }
      html[data-theme="plum"]      { background: linear-gradient(160deg, hsl(290 30% 97%) 0%, hsl(285 45% 92%) 50%, hsl(320 50% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="plum"] { background: linear-gradient(160deg, hsl(285 28% 11%) 0%, hsl(285 32% 17%) 50%, hsl(320 28% 18%) 100%) no-repeat fixed; }
      html[data-theme="midnight"]      { background: linear-gradient(160deg, hsl(220 35% 96%) 0%, hsl(220 55% 92%) 50%, hsl(195 50% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="midnight"] { background: linear-gradient(160deg, hsl(222 35% 8%) 0%, hsl(220 32% 16%) 50%, hsl(195 28% 16%) 100%) no-repeat fixed; }
      html[data-theme="moss"]      { background: linear-gradient(160deg, hsl(95 25% 96%) 0%, hsl(95 35% 90%) 50%, hsl(50 40% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="moss"] { background: linear-gradient(160deg, hsl(95 22% 10%) 0%, hsl(95 26% 15%) 50%, hsl(50 20% 14%) 100%) no-repeat fixed; }
      html[data-theme="ember"]      { background: linear-gradient(160deg, hsl(10 45% 97%) 0%, hsl(10 65% 92%) 50%, hsl(35 65% 93%) 100%) no-repeat fixed; }
      html.dark[data-theme="ember"] { background: linear-gradient(160deg, hsl(10 25% 10%) 0%, hsl(10 30% 17%) 50%, hsl(35 24% 16%) 100%) no-repeat fixed; }
      html[data-theme="sand"]      { background: linear-gradient(160deg, hsl(38 50% 96%) 0%, hsl(35 55% 91%) 50%, hsl(18 50% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="sand"] { background: linear-gradient(160deg, hsl(32 22% 11%) 0%, hsl(32 26% 17%) 50%, hsl(18 22% 17%) 100%) no-repeat fixed; }
      html[data-theme="blossom"]      { background: linear-gradient(160deg, hsl(320 40% 97%) 0%, hsl(320 55% 93%) 50%, hsl(280 50% 94%) 100%) no-repeat fixed; }
      html.dark[data-theme="blossom"] { background: linear-gradient(160deg, hsl(320 25% 11%) 0%, hsl(320 30% 18%) 50%, hsl(280 25% 18%) 100%) no-repeat fixed; }
      html[data-theme="noir"]      { background: linear-gradient(160deg, hsl(240 12% 96%) 0%, hsl(240 14% 92%) 100%) no-repeat fixed; }
      html.dark[data-theme="noir"] { background: linear-gradient(160deg, hsl(240 12% 6%) 0%, hsl(240 14% 12%) 100%) no-repeat fixed; }
    </style>
    <script>
      // Apply persisted theme + color preset BEFORE first paint to avoid FOUC.
      (function () {
        try {
          var t = localStorage.getItem("theme"); // next-themes key
          var sysDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = t === "dark" || ((!t || t === "system") && sysDark);
          if (dark) document.documentElement.classList.add("dark");
          var p = localStorage.getItem("careflow:theme-preset");
          if (p && p !== "default") document.documentElement.setAttribute("data-theme", p);
        } catch (_) { /* ignore */ }
      })();
    </script>
</head>
